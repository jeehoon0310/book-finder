name: Build & Deploy to Synology

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=
            type=raw,value={{date 'YYYYMMDD-HHmm'}},enable={{is_default_branch}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          sbom: true
          provenance: true

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image with Cosign
        run: cosign sign --yes ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}

      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Deploy to Synology
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SYNOLOGY_HOST }}
          username: ${{ secrets.SYNOLOGY_USERNAME }}
          key: ${{ secrets.SYNOLOGY_SSH_KEY }}
          port: ${{ secrets.SYNOLOGY_PORT }}
          script: |
            echo "${{ secrets.GHCR_TOKEN }}" | sudo /usr/local/bin/docker login ghcr.io -u jeehoon0310 --password-stdin
            sudo /usr/local/bin/docker pull ghcr.io/jeehoon0310/book-finder:latest
            cd /volume1/docker/book-finder
            curl -sfL -H "Authorization: token ${{ secrets.GHCR_TOKEN }}" \
              "https://raw.githubusercontent.com/jeehoon0310/book-finder/main/docker-compose.prod.yml" \
              -o docker-compose.yml.new
            if ! diff -q docker-compose.yml docker-compose.yml.new > /dev/null 2>&1; then
              echo "📄 docker-compose.yml updated from Git"
              sudo mv docker-compose.yml.new docker-compose.yml
            else
              rm docker-compose.yml.new
              echo "📄 docker-compose.yml unchanged"
            fi
            sudo /usr/local/bin/docker compose down
            sudo /usr/local/bin/docker compose up -d
            sudo /usr/local/bin/docker image prune -f
            for i in $(seq 1 30); do
              curl -sf http://localhost:3000/api/health && echo " ✅ OK" && exit 0
              sleep 2
            done
            echo "❌ Health check failed"
            sudo /usr/local/bin/docker logs book-finder --tail=50
            exit 1
